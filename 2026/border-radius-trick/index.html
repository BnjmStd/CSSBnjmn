<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      nav {
        anchor-name: --active-nav;
      }

      nav::after {
        content: "";
        background: oklch(from deeppink a(50%));
        border: 2px solid deeppink;
        box-shadow: inset 0 0 12px oklch(from deeppink);

        border-radius: 2rem;
        corner-shape: squircle;

        position: absolute;

        position-anchor: --active-nav;

        left: anchor(left);
        right: anchor(right);
        top: anchor(top);
        bottom: anchor(bottom);

        z-index: -1;
        transition: inset 1000ms;

        transition-timing-function: linear(0, 0.5, 1.2, 0.9, 1.05, 0.98, 1);
      }

      nav a:is(:hover, :focus-visible) {
        anchor-name: --active-nav;
      }
    </style>
