<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #262626;
        min-height: 200vh;
      }

      nav {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        background: #333;
        display: flex;
        align-items: center;
        justify-content: space-between;

        padding-block: 0;
        padding-inline: 50px;
      }

      ul {
        display: flex;
      }

      ul li {
        list-style: none;
      }

      .brand {
        position: relative;
        font-size: 1.8em;
        font-weight: bold;
        text-decoration: none;
        color: white;
        padding-block: 5px;
        padding-inline: 0;

        overflow: hidden;
      }

      .brand span {
        transition: 0.5s;
        display: block;

        &:nth-child(1) {
          position: absolute;
          transform: translateY(-80px);
          font-size: 1.5em;
        }
      }
    </style>
  </head>
  <body>
    <nav id="navbar">
      <a href="#" class="brand">
        <span></span>
        <span>google</span>
      </a>

      <ul>
        <li style="--i: 0">
          <a href="#">
            <span>Home</span>
            <span></span>
          </a>
        </li>
        <li style="--i: 1">
          <a href="#">
            <span>About</span>
            <span></span>
          </a>
        </li>
        <li style="--i: 2">
          <a href="#">
            <span>Services</span>
            <span></span>
          </a>
        </li>
        <li style="--i: 3">
          <a href="#">
            <span>Portfolio</span>
            <span></span>
          </a>
        </li>
      </ul>
    </nav>

    <script>
      let lastScrollTop = 0;

      const $navbar = document.getElementById("navbar");

      window.addEventListener("scroll", () => {
        const scrollTop =
          window.pageYOffset || document.documentElement.scrollTop;

        if (scrollTop > lastScrollTop) {
          $navbar.classList.add("icon");
        } else {
          $navbar.classList.remove("icon");
        }

        lastScrollTop = scrollTop;
      });
    </script>
  </body>
</html>
