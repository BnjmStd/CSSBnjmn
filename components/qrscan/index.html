<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-block-size: 100vh;
      }

      .scan {
        position: relative;

        display: flex;
        align-items: center;
        flex-direction: column;

        & > .qrcode {
          position: relative;

          width: 400px;
          height: 400px;
          margin-bottom: 1rem;

          background: url(./assets/QR_Code01.png) no-repeat center center;

          background-size: 400px;

          &::before {
            content: "";
            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: url(./assets/QR_Code02.png);

            background-size: 400px;

            animation: scan 4s linear infinite;
          }

          &::after {
            content: "";
            position: absolute;

            inset: 20px;
            width: calc(100% - 20px);

            height: 2px;

            background: #35fd5c;

            filter: drop-shadow(0 0 20px #35fd5c) drop-shadow(0 0 60px #35fd5c);

            animation: animateLine 4s ease-in-out infinite;
          }
        }
      }

      @keyframes animateLine {
        0%{
            top: 20px;
        }
        50% {
            top: calc(100% - 20px);
        }
      }

      @keyframes scan {
        0%,
        100% {
          height: 0;
        }
        50% {
          height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="scan">
      <div class="qrcode"></div>
      <h3>Scan QR Code</h3>
    </div>
  </body>
</html>
